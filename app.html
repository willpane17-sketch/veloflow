<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloflow — AI Code Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b12; --surface: #0f1420; --surface2: #141926;
      --border: rgba(255,255,255,0.07); --accent: #6c63ff; --accent2: #3ecfcf;
      --text: #e8eaf0; --muted: #7a8099;
      --grad: linear-gradient(135deg, #6c63ff 0%, #3ecfcf 100%);
      --success: #28ca41; --warn: #ffbd2e; --danger: #ff5f57;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); gap: 16px; }
    .logo-link { font-size: 1.1rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; text-decoration: none; }
    .topbar-center { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
    .lang-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 8px; font-size: 0.85rem; outline: none; cursor: pointer; transition: border-color 0.2s; }
    .lang-select:focus { border-color: rgba(108,99,255,0.5); }
    .btn-review { padding: 8px 22px; border-radius: 8px; background: var(--grad); color: #fff; font-size: 0.88rem; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 0 16px rgba(108,99,255,0.3); transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .btn-review:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .btn-review:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-clear { padding: 8px 14px; border-radius: 8px; background: transparent; color: var(--muted); font-size: 0.85rem; font-weight: 600; border: 1px solid var(--border); cursor: pointer; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
    .btn-clear:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-home { padding: 7px 14px; border-radius: 8px; background: transparent; color: var(--muted); font-size: 0.8rem; font-weight: 600; border: 1px solid var(--border); cursor: pointer; transition: color 0.2s; text-decoration: none; white-space: nowrap; }
    .btn-home:hover { color: var(--text); }
    .topbar-right { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-dot.active { background: var(--accent2); animation: pulse 1.5s infinite; }
    .status-dot.done { background: var(--success); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .main { display: flex; flex: 1; overflow: hidden; }
    .editor-pane { width: 50%; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
    .pane-label { padding: 8px 16px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
    .char-count { font-size: 0.7rem; color: var(--muted); font-weight: 400; letter-spacing: 0; text-transform: none; }
    #editor-container { flex: 1; overflow: hidden; }
    .editor-placeholder { position: absolute; top: 48px; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; opacity: 0.4; gap: 12px; }
    .editor-placeholder .icon { font-size: 2.5rem; }
    .editor-placeholder p { font-size: 0.9rem; color: var(--muted); text-align: center; line-height: 1.6; }
    .review-pane { width: 50%; display: flex; flex-direction: column; overflow: hidden; }
    .review-header { padding: 8px 16px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
    .review-body { flex: 1; overflow-y: auto; padding: 24px; font-size: 0.88rem; line-height: 1.8; }
    .review-body::-webkit-scrollbar { width: 6px; }
    .review-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; opacity: 0.5; }
    .empty-icon { font-size: 3rem; }
    .empty-state h3 { font-size: 1rem; font-weight: 600; }
    .empty-state p { font-size: 0.82rem; color: var(--muted); text-align: center; max-width: 260px; line-height: 1.6; }
    .thinking-bar { display: none; padding: 12px 24px; flex-shrink: 0; border-top: 1px solid var(--border); background: rgba(108,99,255,0.05); font-size: 0.8rem; color: var(--accent); align-items: center; gap: 10px; }
    .thinking-bar.visible { display: flex; }
    .thinking-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin: 0 2px; animation: bounce 1.2s ease-in-out infinite; }
    .thinking-dots span:nth-child(2){animation-delay:0.2s} .thinking-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .review-body h2 { font-size: 1rem; font-weight: 800; margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .review-body h2:first-child { margin-top: 0; }
    .review-body h3 { font-size: 0.9rem; font-weight: 700; margin: 16px 0 6px; color: var(--accent2); }
    .review-body p { margin-bottom: 10px; }
    .review-body ul, .review-body ol { padding-left: 20px; margin-bottom: 12px; }
    .review-body li { margin-bottom: 6px; }
    .review-body strong { color: #fff; font-weight: 700; }
    .review-body em { color: var(--accent2); font-style: italic; }
    .review-body code { background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.2); padding: 1px 6px; border-radius: 4px; font-family: 'Fira Code','Courier New',monospace; font-size: 0.82rem; color: #a09af0; }
    .review-body pre { background: #0c0f18; border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin: 12px 0; overflow-x: auto; }
    .review-body pre code { background: none; border: none; padding: 0; font-size: 0.8rem; color: var(--text); line-height: 1.7; }
    .score-badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; border-radius: 10px; margin: 10px 0; font-weight: 800; font-size: 1.1rem; }
    .score-high{background:rgba(40,202,65,0.1);border:1px solid rgba(40,202,65,0.3);color:var(--success)}
    .score-mid{background:rgba(255,189,46,0.1);border:1px solid rgba(255,189,46,0.3);color:var(--warn)}
    .score-low{background:rgba(255,95,87,0.1);border:1px solid rgba(255,95,87,0.3);color:var(--danger)}
    .statusbar { height: 24px; display: flex; align-items: center; padding: 0 16px; gap: 16px; background: var(--surface2); border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
    .stream-cursor { display: inline-block; width: 2px; height: 14px; background: var(--accent2); margin-left: 1px; vertical-align: middle; animation: blink 0.8s steps(1) infinite; }
    @keyframes blink { 50%{opacity:0} }
    @media(max-width: 768px) {
      .main { flex-direction: column; overflow: auto; }
      .editor-pane, .review-pane { width: 100%; height: 50vh; }
      .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
      .topbar-center { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a class="logo-link" href="/">Veloflow</a>
  <div class="topbar-center">
    <select class="lang-select" id="langSelect">
      <option value="auto">Auto Detect</option>
      <option value="python">Python</option>
      <option value="csharp">C#</option>
      <option value="html">HTML</option>
      <option value="rust">Rust</option>
      <option value="javascript">JavaScript</option>
      <option value="typescript">TypeScript</option>
      <option value="java">Java</option>
      <option value="go">Go</option>
      <option value="cpp">C++</option>
      <option value="css">CSS</option>
      <option value="sql">SQL</option>
      <option value="bash">Bash</option>
    </select>
    <button class="btn-review" id="reviewBtn" onclick="startReview()">
      <span>⚡</span> Analyse Code
    </button>
    <button class="btn-clear" onclick="clearAll()">Clear</button>
  </div>
  <div class="topbar-right">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</div>

<div class="main">
  <div class="editor-pane">
    <div class="pane-label">
      <span>Code Input</span>
      <span class="char-count" id="charCount">0 lines</span>
    </div>
    <div id="editor-container"></div>
    <div class="editor-placeholder" id="editorPlaceholder">
      <div class="icon">📝</div>
      <p>Paste your code here.<br />Supports all major languages.</p>
    </div>
  </div>
  <div class="review-pane">
    <div class="review-header">
      <span>AI Review</span>
      <span id="reviewMeta" style="font-weight:400;font-size:0.7rem;text-transform:none;letter-spacing:0;color:var(--muted)"></span>
    </div>
    <div class="thinking-bar" id="thinkingBar">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span>Claude is thinking...</span>
    </div>
    <div class="review-body" id="reviewBody">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No review yet</h3>
        <p>Paste your code on the left and click <strong>Analyse Code</strong> to get an in-depth AI review with learning guidance.</p>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="sb-lang">Language: —</span>
  <span id="sb-model">Model: Claude Opus 4.6</span>
  <span id="sb-time"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
  let editor = null, reviewing = false, startTime = null;

  require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
  require(['vs/editor/editor.main'], function () {
    editor = monaco.editor.create(document.getElementById('editor-container'), {
      value: '', language: 'python', theme: 'vs-dark', fontSize: 13,
      fontFamily: "'Fira Code','Courier New',monospace", fontLigatures: true,
      minimap: { enabled: false }, scrollBeyondLastLine: false,
      padding: { top: 12, bottom: 12 }, lineNumbers: 'on',
      renderLineHighlight: 'line', smoothScrolling: true,
      cursorBlinking: 'smooth', automaticLayout: true,
    });
    monaco.editor.defineTheme('veloflow', {
      base: 'vs-dark', inherit: true,
      rules: [
        { token: 'comment', foreground: '5a6282', fontStyle: 'italic' },
        { token: 'keyword', foreground: '6c63ff' },
        { token: 'string', foreground: '3ecfcf' },
        { token: 'number', foreground: 'ffbd2e' },
        { token: 'type', foreground: 'a09af0' },
      ],
      colors: {
        'editor.background': '#080b12', 'editor.foreground': '#e8eaf0',
        'editor.lineHighlightBackground': '#0f1420', 'editorCursor.foreground': '#6c63ff',
        'editor.selectionBackground': '#6c63ff33', 'editorLineNumber.foreground': '#3a4060',
        'editorLineNumber.activeForeground': '#6c63ff',
      }
    });
    monaco.editor.setTheme('veloflow');
    editor.onDidChangeModelContent(() => {
      const lines = editor.getModel().getLineCount();
      const chars = editor.getValue().length;
      document.getElementById('charCount').textContent = `${lines} lines · ${chars} chars`;
      document.getElementById('editorPlaceholder').style.display = chars > 0 ? 'none' : 'flex';
    });
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, startReview);
  });

  document.getElementById('langSelect').addEventListener('change', function () {
    if (!editor) return;
    const map = { auto:'plaintext', python:'python', csharp:'csharp', html:'html', rust:'rust', javascript:'javascript', typescript:'typescript', java:'java', go:'go', cpp:'cpp', css:'css', sql:'sql', bash:'shell' };
    monaco.editor.setModelLanguage(editor.getModel(), map[this.value] || 'plaintext');
    document.getElementById('sb-lang').textContent = `Language: ${this.options[this.selectedIndex].text}`;
  });

  function clearAll() {
    if (editor) editor.setValue('');
    document.getElementById('reviewBody').innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>No review yet</h3><p>Paste your code on the left and click <strong>Analyse Code</strong> to get an in-depth AI review with learning guidance.</p></div>`;
    document.getElementById('reviewMeta').textContent = '';
    setStatus('ready');
    document.getElementById('sb-time').textContent = '';
  }

  function setStatus(s) {
    const dot = document.getElementById('statusDot'), text = document.getElementById('statusText'), thinking = document.getElementById('thinkingBar');
    if (s==='ready'){dot.className='status-dot';text.textContent='Ready';thinking.classList.remove('visible')}
    if (s==='thinking'){dot.className='status-dot active';text.textContent='Analysing...';thinking.classList.add('visible')}
    if (s==='streaming'){dot.className='status-dot active';text.textContent='Streaming...';thinking.classList.remove('visible')}
    if (s==='done'){dot.className='status-dot done';text.textContent='Done';thinking.classList.remove('visible')}
    if (s==='error'){dot.className='status-dot';text.textContent='Error';thinking.classList.remove('visible')}
  }

  async function startReview() {
    if (reviewing || !editor) return;
    const code = editor.getValue().trim();
    if (!code) { shakeBtn(); return; }
    reviewing = true; startTime = Date.now();
    const lang = document.getElementById('langSelect').value;
    document.getElementById('reviewBtn').disabled = true;
    setStatus('thinking');
    const reviewBody = document.getElementById('reviewBody');
    reviewBody.innerHTML = '';
    let rawText = '', firstChunk = true;
    try {
      const response = await fetch('https://veloflow.onrender.com/api/review', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language: lang === 'auto' ? '' : lang }),
      });
      if (!response.ok) throw new Error(`Server error: ${response.status}`);
      const reader = response.body.getReader(), decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value, { stream: true }).split('\n')) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.error) throw new Error(data.error);
            if (data.done) break;
            if (data.text) {
              if (firstChunk) { setStatus('streaming'); firstChunk = false; }
              rawText += data.text;
              reviewBody.innerHTML = renderMarkdown(rawText) + '<span class="stream-cursor"></span>';
              reviewBody.scrollTop = reviewBody.scrollHeight;
            }
          } catch(e) { if (e.message !== 'break') console.warn(e); }
        }
      }
      reviewBody.innerHTML = renderMarkdown(rawText);
      applyScoreBadge(reviewBody);
      setStatus('done');
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      document.getElementById('reviewMeta').textContent = `${elapsed}s · Opus 4.6`;
      document.getElementById('sb-time').textContent = `Review completed in ${elapsed}s`;
    } catch (err) {
      reviewBody.innerHTML = `<div style="color:var(--danger);padding:16px;background:rgba(255,95,87,0.08);border-radius:10px;border:1px solid rgba(255,95,87,0.2)"><strong>Error:</strong> ${err.message}</div>`;
      setStatus('error');
    } finally {
      reviewing = false;
      document.getElementById('reviewBtn').disabled = false;
    }
  }

  function renderMarkdown(text) {
    return text
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_,l,c) => `<pre><code class="language-${l}">${escHtml(c.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/\n\n(?!<)/g, '</p><p>');
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function applyScoreBadge(el) {
    el.innerHTML = el.innerHTML.replace(/\*\*(\d+(?:\.\d+)?)\/10\*\*/g, (_, score) => {
      const n = parseFloat(score), cls = n>=8?'score-high':n>=5?'score-mid':'score-low';
      return `<span class="score-badge ${cls}">⭐ ${score}/10</span>`;
    });
  }

  function shakeBtn() {
    const btn = document.getElementById('reviewBtn');
    btn.style.transform = 'translateX(-4px)';
    setTimeout(() => btn.style.transform = 'translateX(4px)', 80);
    setTimeout(() => btn.style.transform = '', 160);
  }
</script>
</body>
</html>
